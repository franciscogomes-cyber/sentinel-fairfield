<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#1A2A4A"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B87333"/>
      <stop offset="100%" style="stop-color:#D4944A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Circuit lines -->
  <g stroke="#7DD3FC" stroke-width="1" opacity="0.1" fill="none">
    <line x1="0" y1="100" x2="200" y2="100"/><line x1="200" y1="100" x2="200" y2="200"/>
    <line x1="1000" y1="100" x2="1200" y2="100"/><line x1="1000" y1="100" x2="1000" y2="200"/>
    <line x1="0" y1="530" x2="150" y2="530"/><line x1="150" y1="530" x2="150" y2="430"/>
    <line x1="1050" y1="530" x2="1200" y2="530"/><line x1="1050" y1="530" x2="1050" y2="430"/>
  </g>
  <!-- Shield icon -->
  <g transform="translate(160, 135)">
    <path d="M100 0 L190 45 L190 130 Q190 195 100 230 Q10 195 10 130 L10 45 Z"
          fill="none" stroke="url(#shield)" stroke-width="6" stroke-linejoin="round" filter="url(#glow)"/>
    <circle cx="100" cy="105" r="38" fill="none" stroke="url(#shield)" stroke-width="5" filter="url(#glow)"/>
    <circle cx="100" cy="105" r="22" fill="none" stroke="url(#eye)" stroke-width="4"/>
    <circle cx="100" cy="105" r="10" fill="url(#eye)"/>
    <circle cx="96" cy="100" r="4" fill="white" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="420" y="250" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="88" fill="#7DD3FC" letter-spacing="6">SENTINEL</text>
  <text x="420" y="310" font-family="Arial,Helvetica,sans-serif" font-size="28" fill="#B87333" letter-spacing="2">COTACOES INTELIGENTES DE SEGURO DE CREDITO</text>
  <line x1="420" y1="340" x2="780" y2="340" stroke="#B87333" stroke-width="2" opacity="0.4"/>
  <text x="420" y="380" font-family="Arial,Helvetica,sans-serif" font-size="22" fill="white" opacity="0.7">Plataforma com IA da Fairfield que consulta as</text>
  <text x="420" y="410" font-family="Arial,Helvetica,sans-serif" font-size="22" fill="white" opacity="0.7">6 maiores seguradoras do mercado para encontrar</text>
  <text x="420" y="440" font-family="Arial,Helvetica,sans-serif" font-size="22" fill="white" opacity="0.7">a melhor solucao para a sua empresa.</text>
  <!-- Badge gratuito -->
  <rect x="420" y="470" width="220" height="40" rx="20" fill="#B87333" opacity="0.9"/>
  <text x="530" y="497" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="18" fill="white" text-anchor="middle">100% GRATUITO</text>
  <!-- Fairfield -->
  <text x="420" y="570" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="white" opacity="0.4" letter-spacing="3">FAIRFIELD CONSULTORIA EM SEGUROS</text>
  <!-- Borda cobre no topo -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#eye)"/>
</svg>
