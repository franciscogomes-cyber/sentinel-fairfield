<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#132240"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4944A"/>
      <stop offset="100%" style="stop-color:#B87333"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fundo circular navy -->
  <circle cx="256" cy="256" r="245" fill="url(#bg)" stroke="#1E3A5F" stroke-width="3"/>
  <!-- Anel externo sutil -->
  <circle cx="256" cy="256" r="235" fill="none" stroke="#7DD3FC" stroke-width="1.5" opacity="0.2"/>
  <!-- Escudo externo -->
  <path d="M256 60 L420 145 L420 290 Q420 400 256 470 Q92 400 92 290 L92 145 Z"
        fill="none" stroke="url(#shield)" stroke-width="12" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Escudo preenchido interior -->
  <path d="M256 90 L395 165 L395 280 Q395 378 256 440 Q117 378 117 280 L117 165 Z"
        fill="#0D1E35" stroke="#7DD3FC" stroke-width="2" stroke-linejoin="round" opacity="0.6"/>
  <!-- Olho externo -->
  <circle cx="256" cy="240" r="72" fill="none" stroke="url(#shield)" stroke-width="8" filter="url(#glow)"/>
  <!-- Olho médio -->
  <circle cx="256" cy="240" r="46" fill="none" stroke="url(#eye)" stroke-width="6"/>
  <!-- Olho núcleo -->
  <circle cx="256" cy="240" r="22" fill="url(#eye)" filter="url(#glowStrong)"/>
  <!-- Brilho -->
  <circle cx="247" cy="231" r="7" fill="white" opacity="0.7"/>
  <!-- Linhas de scan -->
  <g stroke="#7DD3FC" stroke-width="2.5" opacity="0.5">
    <line x1="195" y1="195" x2="150" y2="158"/>
    <line x1="317" y1="195" x2="362" y2="158"/>
    <line x1="195" y1="285" x2="158" y2="322"/>
    <line x1="317" y1="285" x2="354" y2="322"/>
  </g>
  <!-- Circuitos decorativos -->
  <g stroke="#7DD3FC" stroke-width="2" opacity="0.25" fill="none">
    <line x1="140" y1="130" x2="160" y2="130"/><line x1="160" y1="130" x2="160" y2="155"/>
    <line x1="352" y1="130" x2="372" y2="130"/><line x1="352" y1="130" x2="352" y2="155"/>
    <circle cx="140" cy="130" r="3" fill="#7DD3FC"/>
    <circle cx="372" cy="130" r="3" fill="#7DD3FC"/>
  </g>
  <!-- Letra S -->
  <text x="256" y="400" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="56"
        fill="url(#shield)" text-anchor="middle" letter-spacing="4" filter="url(#glow)">S</text>
</svg>
