<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#1A2A4A"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
    <linearGradient id="dollar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dollarGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Circuitos decorativos -->
  <g stroke="#7DD3FC" stroke-width="2" opacity="0.15" fill="none">
    <line x1="60" y1="100" x2="120" y2="100"/><line x1="120" y1="100" x2="120" y2="150"/>
    <line x1="392" y1="100" x2="452" y2="100"/><line x1="392" y1="100" x2="392" y2="150"/>
    <line x1="60" y1="410" x2="110" y2="410"/><line x1="110" y1="410" x2="110" y2="360"/>
    <line x1="402" y1="410" x2="452" y2="410"/><line x1="402" y1="410" x2="402" y2="360"/>
    <circle cx="60" cy="100" r="4" fill="#7DD3FC"/><circle cx="452" cy="100" r="4" fill="#7DD3FC"/>
    <circle cx="60" cy="410" r="4" fill="#7DD3FC"/><circle cx="452" cy="410" r="4" fill="#7DD3FC"/>
  </g>
  <!-- Escudo externo -->
  <path d="M256 68 L410 142 L410 286 Q410 390 256 458 Q102 390 102 286 L102 142 Z"
        fill="none" stroke="url(#shield)" stroke-width="14" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Escudo interno preenchido -->
  <path d="M256 98 L386 160 L386 278 Q386 368 256 428 Q126 368 126 278 L126 160 Z"
        fill="rgba(125,211,252,0.06)" stroke="url(#shield)" stroke-width="3" stroke-linejoin="round" opacity="0.4"/>
  <!-- Linha de scan horizontal -->
  <line x1="145" y1="260" x2="367" y2="260" stroke="#7DD3FC" stroke-width="1.5" opacity="0.2"/>
  <!-- Cifrão ($) central -->
  <text x="256" y="300" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="bold" font-size="140"
        fill="url(#dollar)" text-anchor="middle" filter="url(#dollarGlow)" opacity="0.9">$</text>
  <!-- Letra S na base -->
  <text x="256" y="418" font-family="Inter,Arial,Helvetica,sans-serif" font-weight="bold" font-size="42"
        fill="url(#shield)" text-anchor="middle" letter-spacing="6" opacity="0.6">S</text>
</svg>
